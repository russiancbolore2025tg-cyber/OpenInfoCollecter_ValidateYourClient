name: Build Telemetry SO

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать сборку кнопкой вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Даем права боту на создание релизов
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4

      - name: Build for arm64-v8a
        run: |
          mkdir build_arm64 && cd build_arm64
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-24 ..
          make
          cp libtelemetry.so ../telemetry-arm64-v8a.so

      - name: Build for armeabi-v7a
        run: |
          mkdir build_arm32 && cd build_arm32
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=armeabi-v7a \
                -DANDROID_PLATFORM=android-24 ..
          make
          cp libtelemetry.so ../telemetry-armeabi-v7a.so

      # Вместо ебучих артефактов - создаем нормальный Релиз
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest        # Тег релиза всегда будет "latest"
          name: "Latest Build"
          make_latest: true
          files: |
            telemetry-arm64-v8a.so
            telemetry-armeabi-v7a.so

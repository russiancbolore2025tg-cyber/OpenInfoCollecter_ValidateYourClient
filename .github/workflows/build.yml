name: Build Telemetry SO

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      telemetry_url:
        description: 'URL сервера телеметрии'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # URL берётся из input (ручной запуск) или из секрета (авто по push)
      - name: Resolve telemetry URL
        run: |
          URL="${{ github.event.inputs.telemetry_url }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.TELEMETRY_URL }}"
          fi
          echo "TELEMETRY_URL=$URL" >> $GITHUB_ENV

      - name: Build for arm64-v8a
        run: |
          mkdir build_arm64 && cd build_arm64
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-24 \
                -DTELEMETRY_URL="${{ env.TELEMETRY_URL }}" ..
          make
          cp libtelemetry.so ../telemetry-arm64-v8a.so

      - name: Build for armeabi-v7a
        run: |
          mkdir build_arm32 && cd build_arm32
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=armeabi-v7a \
                -DANDROID_PLATFORM=android-24 \
                -DTELEMETRY_URL="${{ env.TELEMETRY_URL }}" ..
          make
          cp libtelemetry.so ../telemetry-armeabi-v7a.so

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          make_latest: true
          files: |
            telemetry-arm64-v8a.so
            telemetry-armeabi-v7a.so
